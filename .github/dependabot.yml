version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      drizzle-risk:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      build-tooling:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
          - "vitest"
          - "tsx"
          - "typescript"
      routing:
        patterns:
          - "react-router-dom"
      runtime-http:
        patterns:
          - "undici"
      node-runtime-sensitive:
        patterns:
          - "cross-env"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "vite"
          - "@vitejs/plugin-react"
          - "vitest"
          - "tsx"
          - "typescript"
          - "react-router-dom"
          - "undici"
          - "cross-env"
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
        exclude-patterns:
          - "drizzle-kit"
          - "vite"
          - "@vitejs/plugin-react"
          - "vitest"
          - "tsx"
          - "typescript"
          - "react-router-dom"
          - "cross-env"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns:
          - "*"
